<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login to English Class Booking System">
    <title>Login - English Class Booking</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <!-- Header -->
    <header class="header">
        <h1 data-i18n="appTitle">English Class Schedule</h1>
    </header>

    <!-- Navigation -->
    <nav class="nav-bar">
        <div class="nav-left">
            <a href="/" class="logo" style="text-decoration:none;" data-i18n="appName">📖 English Class</a>
        </div>
        <div class="nav-center" id="nav-lang"></div>
        <div class="nav-right">
            <a href="/" class="btn btn-sm btn-secondary" data-i18n="navBackHome">← Back to Schedule</a>
        </div>
    </nav>

    <!-- Login Form -->
    <div class="auth-container">
        <div class="auth-card">
            <h2 data-i18n="loginTitle">👋 Welcome Back</h2>
            <p class="subtitle" data-i18n="loginSubtitle">Login to start booking classes</p>

            <!-- Google Sign-In Button -->
            <div class="google-auth-section">
                <button type="button" class="btn-google" id="google-login-btn" onclick="handleGoogleAuth()">
                    <svg class="google-icon" viewBox="0 0 24 24" width="20" height="20">
                        <path fill="#4285F4"
                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" />
                        <path fill="#34A853"
                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                        <path fill="#FBBC05"
                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                        <path fill="#EA4335"
                            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                    </svg>
                    <span data-i18n="googleSignIn">Sign in with Google</span>
                </button>
            </div>

            <div class="auth-divider">
                <span data-i18n="authOrDividerLogin">or login with PIN</span>
            </div>

            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="username" data-i18n="loginUsername">Username</label>
                    <input type="text" id="username" name="username" required autocomplete="username"
                        data-i18n-placeholder="loginUsernamePlaceholder">
                </div>
                <div class="form-group">
                    <label for="password" data-i18n="loginPIN">4-Digit PIN</label>
                    <div class="pin-input-container">
                        <input type="password" id="pin1" class="pin-input" maxlength="1" inputmode="numeric"
                            pattern="[0-9]" autocomplete="off" oninput="handlePinInput(this, 'pin2')"
                            onkeydown="handlePinKeydown(event, this, null)">
                        <input type="password" id="pin2" class="pin-input" maxlength="1" inputmode="numeric"
                            pattern="[0-9]" autocomplete="off" oninput="handlePinInput(this, 'pin3')"
                            onkeydown="handlePinKeydown(event, this, 'pin1')">
                        <input type="password" id="pin3" class="pin-input" maxlength="1" inputmode="numeric"
                            pattern="[0-9]" autocomplete="off" oninput="handlePinInput(this, 'pin4')"
                            onkeydown="handlePinKeydown(event, this, 'pin2')">
                        <input type="password" id="pin4" class="pin-input" maxlength="1" inputmode="numeric"
                            pattern="[0-9]" autocomplete="off" oninput="handlePinInput(this, null)"
                            onkeydown="handlePinKeydown(event, this, 'pin3')">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" id="login-btn" data-i18n="loginButton">Login</button>
            </form>

            <div class="auth-links">
                <span data-i18n="loginNoAccount">Don't have an account?</span> <a href="/register.html"
                    data-i18n="loginRegisterLink">Register now</a>
            </div>
        </div>
    </div>

    <script src="/js/i18n.js"></script>
    <script src="/js/auth.js"></script>
</body>

</html>
